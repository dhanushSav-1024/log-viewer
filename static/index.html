<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamWatch — Log Viewer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --bg2: #0f0f0f;
            --bg3: #141414;
            --bg4: #1a1a1a;
            --border: rgba(255, 255, 255, 0.12);
            --border-bright: rgba(255, 255, 255, 0.35);
            --text: #e8e8e8;
            --text-dim: #666;
            --text-muted: #444;
            --white: #ffffff;
            --accent: #ffffff;

            --debug: #4a4a4a;
            --info: #e0e0e0;
            --warning: #f0b429;
            --error: #f05454;
            --critical: #ff2222;

            --font-mono: 'Space Mono', monospace;
            --font-ui: 'DM Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 14px;
        }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── GRID BACKGROUND ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border: 1px solid var(--border-bright);
            background: var(--bg2);
            padding: 20px 28px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            opacity: 0.5;
        }

        .header-left h1 {
            font-family: var(--font-mono);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-left h1 .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 8px #fff;
            }

            50% {
                opacity: 0.4;
                box-shadow: 0 0 2px #fff;
            }
        }

        .header-left h1 .dot.paused {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
            animation: none;
        }

        .header-subtitle {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            margin-top: 6px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ── BUTTONS ── */
        .btn {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 16px;
            border: 1px solid var(--border-bright);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--bg4);
            border-color: var(--white);
            color: var(--white);
        }

        .btn.btn-primary {
            background: var(--white);
            color: #000;
            border-color: var(--white);
        }

        .btn.btn-primary:hover {
            background: #d0d0d0;
        }

        .btn.btn-danger {
            border-color: var(--error);
            color: var(--error);
        }

        .btn.btn-danger:hover {
            background: var(--error);
            color: #fff;
        }

        .btn.btn-pause {
            border-color: var(--warning);
            color: var(--warning);
        }

        .btn.btn-pause:hover,
        .btn.btn-pause.active {
            background: var(--warning);
            color: #000;
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .stat-block {
            flex: 1;
            padding: 10px 16px;
            border-right: 1px solid var(--border);
            background: var(--bg2);
        }

        .stat-block:last-child {
            border-right: none;
        }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 3px;
        }

        .stat-val {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
        }

        .stat-val.warn {
            color: var(--warning);
        }

        .stat-val.err {
            color: var(--error);
        }

        .stat-val.crit {
            color: var(--critical);
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-right: 4px;
        }

        .filter-chip {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            padding: 5px 12px;
            border: 1px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            font-weight: 700;
        }

        .chip-debug {
            border-color: var(--debug);
            color: var(--debug);
        }

        .chip-info {
            border-color: var(--info);
            color: var(--info);
        }

        .chip-warning {
            border-color: var(--warning);
            color: var(--warning);
        }

        .chip-error {
            border-color: var(--error);
            color: var(--error);
        }

        .chip-critical {
            border-color: var(--critical);
            color: var(--critical);
        }

        .chip-debug.active {
            background: var(--debug);
            color: #fff;
        }

        .chip-info.active {
            background: #fff;
            color: #000;
        }

        .chip-warning.active {
            background: var(--warning);
            color: #000;
        }

        .chip-error.active {
            background: var(--error);
            color: #fff;
        }

        .chip-critical.active {
            background: var(--critical);
            color: #fff;
        }

        .divider {
            width: 1px;
            background: var(--border);
            align-self: stretch;
            margin: 0 4px;
        }

        /* ── CUSTOM TAGS ── */
        .tag-section {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: none;
            margin-bottom: 16px;
        }

        .custom-tag {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .custom-tag:hover {
            border-color: var(--white);
            color: var(--white);
        }

        .custom-tag.active {
            background: var(--white);
            color: #000;
            border-color: var(--white);
        }

        .custom-tag .tag-del {
            font-size: 0.7rem;
            opacity: 0.5;
            line-height: 1;
            padding-left: 2px;
        }

        .custom-tag .tag-del:hover {
            opacity: 1;
            color: var(--error);
        }

        .tag-input-wrap {
            display: flex;
            gap: 6px;
        }

        .tag-input {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            padding: 5px 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            outline: none;
            width: 140px;
            transition: border-color 0.15s;
        }

        .tag-input:focus {
            border-color: var(--border-bright);
        }

        .tag-input::placeholder {
            color: var(--text-muted);
        }

        /* ── LOG CONTAINER ── */
        .log-outer {
            border: 1px solid var(--border);
            background: var(--bg2);
        }

        .log-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg3);
        }

        .log-toolbar-left {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .log-container {
            max-height: 68vh;
            overflow-y: auto;
            padding: 8px;
        }

        /* ── LOG ENTRY ── */
        .log-entry {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            line-height: 1.6;
            border: 1px solid transparent;
            border-left: 3px solid;
            background: var(--bg3);
            margin-bottom: 4px;
            padding: 9px 12px;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }

        .log-entry:hover {
            border-color: var(--border-bright);
            background: var(--bg4);
        }

        .log-entry:hover .entry-actions {
            opacity: 1;
        }

        .log-debug {
            border-left-color: var(--debug);
        }

        .log-info {
            border-left-color: var(--info);
        }

        .log-warning {
            border-left-color: var(--warning);
        }

        .log-error {
            border-left-color: var(--error);
        }

        .log-custom {
            border-left-color: rgba(180, 140, 255, 0.6);
        }

        .badge-custom {
            background: rgba(180, 140, 255, 0.15);
            color: rgba(180, 140, 255, 0.9);
            border: 1px solid rgba(180, 140, 255, 0.4);
        }

        .log-critical {
            border-left-color: var(--critical);
            background: rgba(255, 34, 34, 0.04);
        }

        .entry-head {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .entry-time {
            color: var(--text-dim);
            font-size: 0.63rem;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .entry-badge {
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            padding: 2px 7px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            min-width: 60px;
            text-align: center;
        }

        .badge-debug {
            background: var(--debug);
            color: #aaa;
        }

        .badge-info {
            background: #fff;
            color: #000;
        }

        .badge-warning {
            background: var(--warning);
            color: #000;
        }

        .badge-error {
            background: var(--error);
            color: #fff;
        }

        .badge-critical {
            background: var(--critical);
            color: #fff;
        }

        .entry-msg {
            color: var(--text);
            word-break: break-all;
            flex: 1;
            min-width: 0;
        }

        .entry-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .action-btn {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            letter-spacing: 0.08em;
            padding: 3px 8px;
            border: 1px solid var(--border-bright);
            background: var(--bg);
            color: var(--text-dim);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .action-btn:hover {
            border-color: var(--white);
            color: var(--white);
            background: var(--bg4);
        }

        .action-btn.copied {
            border-color: #4ade80;
            color: #4ade80;
        }

        .entry-source {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .entry-source span {
            color: rgba(255, 255, 255, 0.35);
        }

        /* ── CUSTOM TAGS on entry ── */
        .entry-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .entry-tag-badge {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            letter-spacing: 0.06em;
            padding: 1px 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        /* ── JSON VIEWER ── */
        .json-toggle {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 3px 8px;
            background: transparent;
            transition: all 0.15s;
        }

        .json-toggle:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.8);
        }

        .json-toggle .arrow {
            transition: transform 0.2s;
            display: inline-block;
        }

        .json-toggle.open .arrow {
            transform: rotate(90deg);
        }

        .json-viewer {
            display: none;
            margin-top: 8px;
            padding: 10px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }

        .json-viewer.open {
            display: block;
        }

        /* JSON syntax */
        .jk {
            color: #93c5fd;
        }

        /* key */
        .jst {
            color: #86efac;
        }

        /* string value */
        .jn {
            color: #fbbf24;
        }

        /* number */
        .jb {
            color: #c084fc;
        }

        /* bool/null */
        .jp {
            color: #94a3b8;
        }

        /* punctuation */

        .json-node {
            padding-left: 16px;
        }

        .json-collapsible {
            cursor: pointer;
        }

        .json-collapsible::before {
            content: '▸ ';
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.6rem;
        }

        .json-collapsible.open::before {
            content: '▾ ';
        }

        .json-children {
            display: none;
        }

        .json-children.open {
            display: block;
        }

        /* ── NO LOGS ── */
        .no-logs {
            padding: 60px 20px;
            text-align: center;
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .no-logs::before {
            content: '[ NO SIGNAL ]';
            display: block;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.08);
            margin-bottom: 12px;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 18px;
            background: var(--white);
            color: #000;
            border: none;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ── PAUSE OVERLAY ── */
        .pause-badge {
            display: none;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--warning);
            padding: 4px 10px;
            border: 1px solid var(--warning);
        }

        .pause-badge.show {
            display: inline-flex;
        }
    </style>
</head>

<body>
    <div class="app">

        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <h1>
                    <span class="dot" id="statusDot"></span>
                    STREAMWATCH // LOG VIEWER
                </h1>
                <div class="header-subtitle" id="serverInfo">SYSTEM NOMINAL — AWAITING TELEMETRY</div>
            </div>
            <div class="header-right">
                <span class="pause-badge" id="pauseBadge">⏸ PAUSED</span>
                <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>
                <button class="btn btn-danger" onclick="clearLogs()">✕ CLEAR</button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-block">
                <div class="stat-label">Total</div>
                <div class="stat-val" id="statTotal">0</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Visible</div>
                <div class="stat-val" id="statVisible">0</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Warnings</div>
                <div class="stat-val warn" id="statWarn">0</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Errors</div>
                <div class="stat-val err" id="statErr">0</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Critical</div>
                <div class="stat-val crit" id="statCrit">0</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">Last Update</div>
                <div class="stat-val" id="statTime" style="font-size:0.75rem">—</div>
            </div>
        </div>

        <!-- LEVEL FILTERS -->
        <div class="controls">
            <span class="section-label">Level</span>
            <button class="filter-chip chip-debug active" onclick="toggleLevel('DEBUG',this)">Debug</button>
            <button class="filter-chip chip-info active" onclick="toggleLevel('INFO',this)">Info</button>
            <button class="filter-chip chip-warning active" onclick="toggleLevel('WARNING',this)">Warning</button>
            <button class="filter-chip chip-error active" onclick="toggleLevel('ERROR',this)">Error</button>
            <button class="filter-chip chip-critical active" onclick="toggleLevel('CRITICAL',this)">Critical</button>
            <div class="divider"></div>
            <span class="section-label">Custom Level</span>
            <span id="activeTagLabel"
                style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:.08em;">NONE</span>
            <button class="btn" onclick="clearTagFilter()" style="padding:5px 10px;font-size:0.6rem;">✕ CLEAR</button>
        </div>

        <!-- CUSTOM LEVELS -->
        <div class="tag-section">
            <span class="section-label">Custom Levels</span>
            <div id="tagList"></div>
            <div class="tag-input-wrap">
                <input class="tag-input" id="tagInput" type="text" placeholder="e.g. TRACE, VERBOSE..." maxlength="20"
                    onkeydown="if(event.key==='Enter') addTag()">
                <button class="btn" onclick="addTag()" style="padding:5px 12px;font-size:0.6rem;">+ ADD</button>
            </div>
        </div>

        <!-- LOG PANEL -->
        <div class="log-outer">
            <div class="log-toolbar">
                <span class="log-toolbar-left">// OUTPUT STREAM</span>
                <button class="btn" onclick="scrollToBottom()" style="padding:4px 10px;font-size:0.58rem;">↓
                    BOTTOM</button>
            </div>
            <div class="log-container" id="logContainer">
                <div class="no-logs">Waiting for incoming logs...</div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        const levels = { DEBUG: true, INFO: true, WARNING: true, ERROR: true, CRITICAL: true };
        let paused = false;
        let allLogs = [];
        let activeTagFilter = null;
        function setCookie(k, v, days = 365) {
            const d = new Date(); d.setTime(d.getTime() + days * 86400000);
            document.cookie = `${k}=${encodeURIComponent(v)};expires=${d.toUTCString()};path=/`;
        }
        function getCookie(k) {
            const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
            return m ? decodeURIComponent(m[1]) : null;
        }
        let customTags = [];
        function saveTags() { setCookie('sw_custom_levels', JSON.stringify(customTags)); }
        function loadTags() {
            try { const c = getCookie('sw_custom_levels'); if (c) customTags = JSON.parse(c); } catch (e) { }
            renderTags();
        }
        function addTag() {
            const inp = document.getElementById('tagInput');
            const val = inp.value.trim().toUpperCase();
            if (!val || customTags.includes(val)) return;
            customTags.push(val); saveTags(); renderTags();
            inp.value = '';
        }
        function removeTag(t) {
            customTags = customTags.filter(x => x !== t);
            if (activeTagFilter === t) activeTagFilter = null;
            document.getElementById('activeTagLabel').textContent = activeTagFilter || 'NONE';
            saveTags(); renderTags(); filterLogs();
        }
        function filterByTag(t) {
            activeTagFilter = (activeTagFilter === t) ? null : t;
            document.getElementById('activeTagLabel').textContent = activeTagFilter || 'NONE';
            renderTags(); filterLogs();
        }
        function clearTagFilter() {
            activeTagFilter = null;
            document.getElementById('activeTagLabel').textContent = 'NONE';
            renderTags(); filterLogs();
        }
        function renderTags() {
            const wrap = document.getElementById('tagList');
            wrap.innerHTML = customTags.map(t => `
        <span class="custom-tag${activeTagFilter === t ? ' active' : ''}" onclick="filterByTag('${t}')">
            ${t}
            <span class="tag-del" onclick="event.stopPropagation();removeTag('${t}')">✕</span>
        </span>
    `).join('');
        }
        function toggleLevel(level, btn) {
            levels[level] = !levels[level];
            btn.classList.toggle('active');
            saveLevelCookies(); filterLogs();
        }
        function saveLevelCookies() {
            setCookie('sw_levels', JSON.stringify(levels));
        }
        function loadLevelCookies() {
            try {
                const c = getCookie('sw_levels');
                if (!c) return;
                const saved = JSON.parse(c);
                Object.keys(saved).forEach(k => {
                    levels[k] = saved[k];
                });
                document.querySelectorAll('.filter-chip').forEach(btn => {
                    const lvl = btn.textContent.trim().toUpperCase();
                    if (!levels[lvl]) btn.classList.remove('active');
                    else btn.classList.add('active');
                });
            } catch (e) { }
        }
        function togglePause() {
            paused = !paused;
            const btn = document.getElementById('pauseBtn');
            const dot = document.getElementById('statusDot');
            const badge = document.getElementById('pauseBadge');
            if (paused) {
                btn.textContent = '▶ RESUME'; btn.classList.add('active');
                dot.classList.add('paused');
                badge.classList.add('show');
                document.getElementById('serverInfo').textContent = 'STREAM PAUSED';
            } else {
                btn.textContent = '⏸ PAUSE'; btn.classList.remove('active');
                dot.classList.remove('paused');
                badge.classList.remove('show');
                document.getElementById('serverInfo').textContent = 'SYSTEM NOMINAL — LIVE';
                fetchLogs();
            }
        }
        function extractJSON(msg) {
            const starts = [...msg.matchAll(/[\{\[]/g)].map(m => m.index);
            for (const s of starts) {
                for (let e = msg.length; e > s; e--) {
                    try {
                        const sub = msg.slice(s, e);
                        const parsed = JSON.parse(sub);
                        if (typeof parsed === 'object' && parsed !== null)
                            return { parsed, pre: msg.slice(0, s), post: msg.slice(e) };
                    } catch (_) { }
                }
            }
            return null;
        }

        function buildJsonTree(data, depth = 0) {
            if (data === null) return `<span class="jb">null</span>`;
            if (typeof data === 'boolean') return `<span class="jb">${data}</span>`;
            if (typeof data === 'number') return `<span class="jn">${data}</span>`;
            if (typeof data === 'string') return `<span class="jst">"${escapeHtml(data)}"</span>`;

            if (Array.isArray(data)) {
                if (data.length === 0) return `<span class="jp">[]</span>`;
                const items = data.map(v =>
                    `<div class="json-node">${buildJsonTree(v, depth + 1)}<span class="jp">,</span></div>`
                ).join('');
                const id = 'j' + Math.random().toString(36).slice(2, 8);
                return `<span class="jp">[</span>
            <span class="json-collapsible" onclick="toggleJsonNode('${id}',this)"></span>
            <div class="json-children" id="${id}">${items}</div>
            <span class="jp">]</span>`;
            }
            const keys = Object.keys(data);
            if (keys.length === 0) return `<span class="jp">{}</span>`;
            const items = keys.map(k => {
                const v = buildJsonTree(data[k], depth + 1);
                return `<div class="json-node"><span class="jk">"${escapeHtml(k)}"</span><span class="jp">: </span>${v}<span class="jp">,</span></div>`;
            }).join('');
            const id = 'j' + Math.random().toString(36).slice(2, 8);
            return `<span class="jp">{</span>
        <span class="json-collapsible" onclick="toggleJsonNode('${id}',this)"></span>
        <div class="json-children" id="${id}">${items}</div>
        <span class="jp">}</span>`;
        }

        function toggleJsonNode(id, el) {
            const c = document.getElementById(id);
            c.classList.toggle('open');
            el.classList.toggle('open');
        }
        function renderEntry(log, idx) {
            const lvlU = log.level.toUpperCase();
            const builtins = ['DEBUG', 'INFO', 'WARNING', 'ERROR', 'CRITICAL'];
            const isBuiltin = builtins.includes(lvlU);
            const lvlClass = isBuiltin ? lvlU.toLowerCase() : 'custom';
            const badgeClass = isBuiltin ? `badge-${lvlU.toLowerCase()}` : 'badge-custom';
            const isCustomLevel = customTags.includes(lvlU);
            const jResult = extractJSON(log.message);
            let msgHtml = '';
            let jsonHtml = '';

            if (jResult) {
                msgHtml = `${escapeHtml(jResult.pre)}<span style="color:rgba(255,255,255,0.35)">[JSON]</span>${escapeHtml(jResult.post)}`;
                const jid = 'jv' + idx;
                jsonHtml = `
            <div>
                <button class="json-toggle" onclick="toggleViewer('${jid}',this)">
                    <span class="arrow">▸</span> JSON DATA
                </button>
                <div class="json-viewer" id="${jid}">
                    ${buildJsonTree(jResult.parsed)}
                </div>
            </div>`;
            } else {
                msgHtml = escapeHtml(log.message);
            }
            const customLevelHtml = isCustomLevel
                ? `<span class="entry-tag-badge" style="border-color:rgba(180,140,255,0.5);color:rgba(180,140,255,0.8)">${lvlU}</span>`
                : '';

            const srcHtml = log.logger
                ? `<div class="entry-source">Logger: <span>${log.logger}</span> | <span>${log.filename || '—'}:${log.lineno || '?'}</span></div>`
                : '';

            return `
    <div class="log-entry log-${lvlClass}" data-level="${lvlU}" id="le${idx}">
        <div class="entry-actions">
            <button class="action-btn" onclick="copyEntry(${idx})">⎘ COPY</button>
        </div>
        <div class="entry-head">
            <span class="entry-time">${log.time}</span>
            <span class="entry-badge ${badgeClass}">${lvlU}</span>
            <span class="entry-msg">${msgHtml}</span>
        </div>
        ${srcHtml}
        ${customLevelHtml ? `<div class="entry-tags">${customLevelHtml}</div>` : ''}
        ${jsonHtml}
    </div>`;
        }

        function toggleViewer(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            btn.classList.toggle('open');
        }
        const logTexts = {};
        function copyEntry(idx) {
            const log = allLogs[idx];
            if (!log) return;
            const txt = `[${log.time}] [${log.level}] ${log.message}` + (log.logger ? ` | ${log.logger} ${log.filename}:${log.lineno}` : '');
            navigator.clipboard.writeText(txt).then(() => {
                const btn = document.querySelector(`#le${idx} .action-btn`);
                if (btn) { btn.textContent = '✓ COPIED'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '⎘ COPY'; btn.classList.remove('copied'); }, 1500); }
                showToast('Log copied to clipboard');
            });
        }
        function filterLogs() {
            const entries = document.querySelectorAll('.log-entry');
            let vis = 0, warn = 0, err = 0, crit = 0;
            allLogs.forEach(l => {
                const lvl = l.level.toUpperCase();
                if (lvl === 'WARNING') warn++;
                if (lvl === 'ERROR') err++;
                if (lvl === 'CRITICAL') crit++;
            });
            entries.forEach((el) => {
                const lvl = el.dataset.level; // e.g. "INFO", "TRACE", "VERBOSE"
                const builtins = ['DEBUG', 'INFO', 'WARNING', 'ERROR', 'CRITICAL'];
                const isBuiltin = builtins.includes(lvl);
                const levelChipOk = isBuiltin ? (levels[lvl] || false) : true;
                const customLevelOk = !activeTagFilter || (lvl === activeTagFilter);

                if (levelChipOk && customLevelOk) { el.style.display = ''; vis++; }
                else el.style.display = 'none';
            });
            document.getElementById('statVisible').textContent = vis;
            document.getElementById('statWarn').textContent = warn;
            document.getElementById('statErr').textContent = err;
            document.getElementById('statCrit').textContent = crit;
        }
        function fetchLogs() {
            if (paused) return;
            fetch('/api/logs')
                .then(r => r.json())
                .then(data => {
                    allLogs = data.logs;
                    renderLogs(data.logs);
                    document.getElementById('statTotal').textContent = data.total;
                    document.getElementById('statTime').textContent = new Date().toLocaleTimeString();
                    document.getElementById('serverInfo').textContent = 'SYSTEM NOMINAL — LIVE';
                })
                .catch(() => { document.getElementById('serverInfo').textContent = 'CONNECTION ERROR'; });
        }

        function renderLogs(logs) {
            const container = document.getElementById('logContainer');
            if (!logs.length) {
                container.innerHTML = '<div class="no-logs">Waiting for incoming logs...</div>';
                document.getElementById('statVisible').textContent = 0;
                return;
            }
            const wasAtBottom = (container.scrollHeight - container.scrollTop - container.clientHeight) < 60;
            container.innerHTML = logs.map((l, i) => renderEntry(l, i)).join('');
            filterLogs();
            if (wasAtBottom) container.scrollTop = container.scrollHeight;
        }

        function scrollToBottom() {
            const c = document.getElementById('logContainer');
            c.scrollTop = c.scrollHeight;
        }
        function clearLogs() {
            if (!confirm('Clear all logs?')) return;
            fetch('/api/clear', { method: 'POST' }).then(() => fetchLogs());
        }
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        function escapeHtml(s) {
            if (typeof s !== 'string') return String(s);
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        loadTags();
        loadLevelCookies();
        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>

</html>
